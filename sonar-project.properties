# --- Place this file in the ROOT of each project you want to scan. ---
# All values can be overridden on the command line with -Dsonar.<key>=<value>.

sonar.projectKey=my-app
sonar.projectName=My App
sonar.projectVersion=1.0

# Authentication is via SONAR_TOKEN env var (set in .env), not sonar.login.
# sonar.login has been deprecated since SonarQube 8.x.

# Source location (relative to project root). Default is ".".
sonar.sources=.

# Exclude generated/dependency code from analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/vendor/**,**/*.min.js

# Language-specific test & coverage reporting (uncomment as needed):
# sonar.tests=src/tests
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

